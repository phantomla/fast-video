<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fast-video</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { DEFAULT: '#6366f1', dark: '#4f46e5' } } } }
    }
  </script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="h-full text-gray-100 font-sans overflow-hidden">

<div class="flex h-screen w-full overflow-hidden">

<!-- LEFT NAV -->
<nav class="w-52 flex-shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col overflow-y-auto">
  <div class="px-4 py-4 flex items-center gap-2.5 border-b border-gray-800">
    <svg class="w-6 h-6 text-brand flex-shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l16 8-16 8V4z"/></svg>
    <span class="text-base font-bold tracking-tight leading-none">fast-video</span>
  </div>
  <div class="flex-1 py-3 space-y-0.5 px-2">
    <button type="button" data-view="generate"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg bg-brand/10 text-brand text-sm font-medium transition">
      <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l16 8-16 8V4z"/></svg>
      Generate
    </button>
    <button type="button" data-view="history"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 text-sm transition">
      <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      History
    </button>
    <button type="button" data-view="settings"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 text-sm transition">
      <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Settings
    </button>
  </div>
  <div class="px-4 py-3 border-t border-gray-800">
    <div id="locationBadge" class="flex items-center gap-1.5 text-xs text-gray-400">
      <span class="w-2 h-2 rounded-full bg-gray-600 flex-shrink-0"></span>
      <span class="truncate">loading...</span>
    </div>
  </div>
</nav>

<!-- CENTER PANEL -->
<div id="center-panel" class="w-[22rem] flex-shrink-0 border-r border-gray-800 bg-gray-900/60 flex flex-col overflow-hidden">

  <!-- VIEW: Generate -->
  <div id="view-generate" class="flex flex-col flex-1 overflow-y-auto">
  <div class="px-5 py-5">
    <form id="genForm" class="space-y-4" novalidate>

      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1" for="task">Task</label>
        <select id="task" class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 outline-none transition">
          <option value="text_to_video">Text-to-video</option>
          <option value="image_to_video">Image-to-video</option>
          <option value="reference_subject">Reference-to-video (Subject)</option>
          <option value="reference_style">Reference-to-video (Style)</option>
          <option value="video_extension">Video extension</option>
          <option value="inpaint_insert">Video inpaint (Insert)</option>
          <option value="inpaint_remove">Video inpaint (Remove)</option>
        </select>
        <p id="taskDesc" class="mt-1 text-xs text-gray-500 italic"></p>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1" for="prompt">Prompt</label>
        <textarea id="prompt" rows="5" maxlength="2000" required
          placeholder="A cinematic time-lapse of a thunderstorm..."
          class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 placeholder-gray-500 resize-none outline-none transition"></textarea>
        <div class="text-right text-xs text-gray-500 mt-1"><span id="promptLen">0</span> / 2000</div>
      </div>

      <div id="fieldImageGcs" class="hidden">
        <label class="block text-xs font-medium text-gray-400 mb-1" for="imageGcsUri"><span id="imageGcsLabel">Input Image (GCS URI)</span></label>
        <input type="text" id="imageGcsUri" placeholder="gs://bucket/frame.jpg"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 placeholder-gray-500 outline-none transition" />
      </div>

      <div id="fieldSubjectDesc" class="hidden">
        <label class="block text-xs font-medium text-gray-400 mb-1" for="subjectDesc">Subject Description <span class="text-gray-600">(optional)</span></label>
        <input type="text" id="subjectDesc" maxlength="500" placeholder="A golden retriever puppy"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 placeholder-gray-500 outline-none transition" />
      </div>

      <div id="fieldVideoGcs" class="hidden">
        <label class="block text-xs font-medium text-gray-400 mb-1" for="videoGcsUri">Input Video (GCS URI)</label>
        <input type="text" id="videoGcsUri" placeholder="gs://bucket/input.mp4"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 placeholder-gray-500 outline-none transition" />
      </div>

      <div id="fieldMaskGcs" class="hidden">
        <label class="block text-xs font-medium text-gray-400 mb-1" for="maskGcsUri">Mask (GCS URI)</label>
        <input type="text" id="maskGcsUri" placeholder="gs://bucket/mask.mp4"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 placeholder-gray-500 outline-none transition" />
      </div>

      <div>
        <div class="flex items-center gap-1.5 mb-1">
          <label class="text-xs font-medium text-gray-400" for="model">Model</label>
          <button type="button" id="modelInfoBtn" class="text-gray-500 hover:text-brand transition" title="See available models">
            <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
        <select id="model" class="w-full rounded-lg bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-2 text-sm text-gray-100 outline-none transition">
          <option value="" disabled selected>Loading models...</option>
        </select>
      </div>

      <div id="audioToggleWrap" class="flex items-center justify-between rounded-lg border border-gray-700 bg-gray-800/40 px-3 py-2.5 transition">
        <div>
          <span class="text-sm font-medium text-gray-300">Generate audio</span>
          <p class="text-xs text-gray-500 mt-0.5 leading-snug">Veo 3.0+ only.</p>
        </div>
        <label class="relative inline-flex items-center cursor-pointer ml-3 flex-shrink-0">
          <input type="checkbox" id="generateAudio" class="sr-only peer" />
          <div class="w-10 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand transition"></div>
        </label>
      </div>

      <div>
        <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2.5">Parameters</h3>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Ratio</label>
            <div class="flex gap-1.5">
              <label class="flex-1"><input type="radio" name="aspectRatio" value="16:9" checked class="sr-only peer" /><span class="block text-center text-xs py-1.5 rounded-lg border border-gray-700 peer-checked:border-brand peer-checked:bg-brand/10 cursor-pointer transition">16:9</span></label>
              <label class="flex-1"><input type="radio" name="aspectRatio" value="9:16" class="sr-only peer" /><span class="block text-center text-xs py-1.5 rounded-lg border border-gray-700 peer-checked:border-brand peer-checked:bg-brand/10 cursor-pointer transition">9:16</span></label>
              <label class="flex-1"><input type="radio" name="aspectRatio" value="1:1" class="sr-only peer" /><span class="block text-center text-xs py-1.5 rounded-lg border border-gray-700 peer-checked:border-brand peer-checked:bg-brand/10 cursor-pointer transition">1:1</span></label>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Resolution</label>
            <div class="flex gap-1.5">
              <label class="flex-1"><input type="radio" name="resolution" value="720p" checked class="sr-only peer" /><span class="block text-center text-xs py-1.5 rounded-lg border border-gray-700 peer-checked:border-brand peer-checked:bg-brand/10 cursor-pointer transition">720p</span></label>
              <label class="flex-1"><input type="radio" name="resolution" value="1080p" class="sr-only peer" /><span class="block text-center text-xs py-1.5 rounded-lg border border-gray-700 peer-checked:border-brand peer-checked:bg-brand/10 cursor-pointer transition">1080p</span></label>
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Length</label>
          <div id="durationGroup" class="flex gap-1.5"></div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Results &mdash; <span id="sampleVal">1</span></label>
          <input type="range" id="sampleCount" min="1" max="4" value="1" class="w-full" />
        </div>
      </div>

      <details class="group rounded-lg border border-gray-700 bg-gray-800/40">
        <summary class="flex items-center justify-between px-4 py-2.5 cursor-pointer select-none text-xs font-medium text-gray-400 hover:text-white list-none">
          Advanced
          <svg class="w-3.5 h-3.5 transition-transform group-open:rotate-180" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
          </svg>
        </summary>
        <div class="px-4 pb-4 pt-3 space-y-3 border-t border-gray-700/60">
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1" for="seed">Seed <span class="text-gray-600">(optional)</span></label>
            <input type="number" id="seed" min="0" placeholder="e.g. 42"
              class="w-full rounded-md bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-1.5 text-sm text-gray-100 placeholder-gray-600 outline-none transition" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1" for="storageUri">Output GCS URI <span class="text-gray-600">(optional)</span></label>
            <input type="text" id="storageUri" placeholder="gs://bucket/output/"
              class="w-full rounded-md bg-gray-800 border border-gray-700 focus:border-brand focus:ring-1 focus:ring-brand px-3 py-1.5 text-sm text-gray-100 placeholder-gray-600 outline-none transition" />
          </div>
        </div>
      </details>

      <div class="space-y-1.5 pt-1">
        <button type="submit" id="submitBtn"
          class="w-full py-2.5 rounded-lg bg-brand hover:bg-brand-dark active:scale-[.98] font-semibold text-sm transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <svg id="spinIcon" class="hidden w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 100 16v-4l-3 3 3 3v-4a8 8 0 01-8-8z"/>
          </svg>
          <span id="submitLabel">Generate Video</span>
        </button>
        <div class="flex items-center justify-center gap-1.5 min-h-[1.25rem]">
          <svg id="priceSpinner" class="w-3 h-3 animate-spin text-gray-500" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 100 16v-4l-3 3 3 3v-4a8 8 0 01-8-8z"/>
          </svg>
          <p id="priceEstimate" class="hidden text-center text-xs text-yellow-400/80 cursor-help">-</p>
        </div>
      </div>

    </form>
  </div>
  </div><!-- /view-generate -->

  <!-- VIEW: History -->
  <div id="view-history" class="hidden flex-col flex-1 overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between">
      <h2 class="text-sm font-semibold text-gray-200">History</h2>
      <button type="button" id="historyRefreshBtn" class="text-gray-500 hover:text-brand transition" title="Refresh">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
    <div class="px-3 py-3 overflow-y-auto flex-1">
      <div id="historyList" class="space-y-2">
        <p class="text-xs text-gray-500 text-center py-8">Loading...</p>
      </div>
    </div>
  </div><!-- /view-history -->

  <!-- VIEW: Settings -->
  <div id="view-settings" class="hidden flex-col flex-1 overflow-y-auto">
    <div class="px-5 py-4 border-b border-gray-800">
      <h2 class="text-sm font-semibold text-gray-200">Settings</h2>
    </div>
    <div class="px-5 py-5">
      <div id="settingsPanel"></div>
    </div>
  </div><!-- /view-settings -->

</div><!-- /center panel -->

<!-- RIGHT COLUMN: header / center(draft) / bottom -->
<div class="flex-1 flex flex-col overflow-hidden bg-gray-950 min-w-0">

  <!-- Header -->
  <div class="flex-shrink-0 flex items-center justify-between px-6 py-3 border-b border-gray-800 bg-gray-900/40">
    <div class="flex items-center gap-2">
      <svg class="w-4 h-4 text-gray-500" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l16 8-16 8V4z"/></svg>
      <span class="text-sm font-medium text-gray-300">Preview</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="previewMeta" class="text-xs text-gray-500 truncate max-w-xs"></span>
      <a id="downloadBtn" href="#" download
        class="hidden text-xs px-3 py-1.5 rounded-lg border border-gray-700 hover:border-brand hover:text-brand transition">
        Download
      </a>
    </div>
  </div>

  <!-- Center: aspect-ratio draft box -->
  <div class="flex-1 flex items-center justify-center p-6 overflow-hidden">
    <div id="draftBox"
      class="relative rounded-xl border-2 border-dashed border-gray-800 overflow-hidden transition-all duration-300"
      style="aspect-ratio:16/9;width:100%;max-height:100%;max-width:calc((100vh - 11rem) * 16 / 9)">

      <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600">
        <svg class="w-12 h-12 mb-3 opacity-30" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l16 8-16 8V4z"/></svg>
        <p class="text-sm">Your generated video will appear here</p>
      </div>

      <div id="progressBox" class="hidden absolute inset-0 flex flex-col items-center justify-center gap-3 bg-gray-950/80">
        <svg class="w-8 h-8 animate-spin text-brand" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 100 16v-4l-3 3 3 3v-4a8 8 0 01-8-8z"/>
        </svg>
        <p class="text-sm font-medium text-gray-300">Generating...</p>
        <p class="text-xs text-gray-500">Usually 60-120 seconds.</p>
      </div>

      <div id="errorBox" class="hidden absolute inset-0 flex flex-col items-center justify-center gap-2 p-6">
        <svg class="w-8 h-8 text-red-500 opacity-70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
        </svg>
        <p class="text-sm font-semibold text-red-400">Generation failed</p>
        <p id="errorMsg" class="text-xs text-red-300 text-center max-w-xs"></p>
      </div>

      <video id="resultVideo" controls class="hidden absolute inset-0 w-full h-full object-contain bg-black"></video>

    </div>
  </div><!-- /center -->

  <!-- Bottom bar -->
  <div class="flex-shrink-0 px-6 py-3 border-t border-gray-800 bg-gray-900/40 flex items-center gap-4">
    <span id="resultMeta" class="flex-1 text-xs text-gray-500 truncate">Ready</span>
  </div>

</div><!-- /right column -->
</div><!-- /shell -->

<!-- Model info modal -->
<div id="modelModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-gray-900 border border-gray-700 rounded-xl p-5 max-w-lg w-full mx-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm font-semibold text-gray-200">Available Models</h3>
      <button type="button" id="modelModalClose" class="text-gray-500 hover:text-white transition text-lg leading-none">&#x2715;</button>
    </div>
    <div id="modelList" class="space-y-1 text-xs text-gray-400">
      <p class="text-gray-600">Loading...</p>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
